<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Exploration Spatiale</title>
    <style>
        :root {
            --SPACE-BLUE: #1E293B;
            --STAR-CYAN: #06B6D4;
            --NOVA-ORANGE: #F59E0B;
            --PULSAR-PURPLE: #8B5CF6;
        }

        body {
            background-color: var(--SPACE-BLUE);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Fond étoilé */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(1px 1px at 20% 30%, #fff, rgba(0,0,0,0)),
                        radial-gradient(1.5px 1.5px at 50% 70%, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 80% 40%, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
        }

        .content {
            z-index: 10;
        }

        .main-icon {
            width: 80px;
            height: 80px;
            fill: var(--NOVA-ORANGE);
            filter: drop-shadow(0 0 10px var(--NOVA-ORANGE));
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            background: linear-gradient(to right, var(--STAR-CYAN), var(--PULSAR-PURPLE));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .secondary-icons {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .icon-small {
            width: 30px;
            height: 30px;
            fill: var(--STAR-CYAN);
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-20px) rotate(-5deg); }
        }

        @keyframes pulse-light {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .glitch {
            animation: pulse-light 2s infinite;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="content">
        <svg class="main-icon" viewBox="0 0 24 24">
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
        </svg>

        <h1 class="glitch">Bientôt disponible</h1>

        <div class="secondary-icons">
            <svg class="icon-small" viewBox="0 0 24 24">
                <path d="M12,2C6.47,2,2,6.47,2,12s4.47,10,10,10s10-4.47,10-10S17.53,2,12,2z M12,20c-4.41,0-8-3.59-8-8s3.59-8,8-8s8,3.59,8,8S16.41,20,12,20z"/>
            </svg>
            <svg class="icon-small" style="fill: var(--PULSAR-PURPLE);" viewBox="0 0 24 24">
                <path d="M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7z M12,15c-1.65,0-3-1.35-3-3s1.35-3,3-3s3,1.35,3,3S13.65,15,12,15z"/>
            </svg>
            <svg class="icon-small" viewBox="0 0 24 24">
                <path d="M21,16.5C21,16.88 20.79,17.21 20.47,17.38L12.57,21.82C12.41,21.94 12.21,22 12,22C11.79,22 11.59,21.94 11.43,21.82L3.53,17.38C3.21,17.21 3,16.88 3,16.5V7.5C3,7.12 3.21,6.79 3.53,6.62L11.43,2.18C11.59,2.06 11.79,2 12,2C12.21,2 12.41,2.06 12.57,2.18L20.47,6.62C20.79,6.79 21,7.12 21,7.5V16.5Z"/>
            </svg>
        </div>
    </div>

</body>
</html>
