<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Bowling - Intro</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; overflow: hidden;
        }

        /* Fond spatial */
        .starfield {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: 0;
        }

        .scene {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; z-index: 10;
        }

        /* Secousse lors de l'impact */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-12px, 8px); }
            50% { transform: translate(12px, -8px); }
            75% { transform: translate(-8px, -12px); }
        }
        .shake-active { animation: shake 0.25s ease-in-out; }

        /* Les Quilles */
        .pin {
            position: absolute;
            width: 20px; height: 70px;
            margin: -35px 0 0 -10px;
            background: linear-gradient(to bottom, #eee 25%, #f00 25%, #f00 35%, #eee 35%);
            border-radius: 40% 40% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4);
            transition: all 0.8s cubic-bezier(0.2, 0.5, 0.3, 1);
        }

        /* Placement initial (triangle) */
        .p1 { transform: translate(0, 0); z-index: 3; }
        .p2 { transform: translate(25px, -20px); z-index: 2; }
        .p3 { transform: translate(25px, 20px); z-index: 2; }
        .p4 { transform: translate(50px, -40px); z-index: 1; }
        .p5 { transform: translate(50px, 0); z-index: 1; }
        .p6 { transform: translate(50px, 40px); z-index: 1; }

        /* Éclatement des quilles */
        .pin.scatter.p1 { transform: translate(200px, -200px) rotate(200deg); opacity: 0; }
        .pin.scatter.p2 { transform: translate(280px, -300px) rotate(-150deg); opacity: 0; }
        .pin.scatter.p3 { transform: translate(250px, 250px) rotate(120deg); opacity: 0; }
        .pin.scatter.p4 { transform: translate(320px, -150px) rotate(280deg); opacity: 0; }
        .pin.scatter.p5 { transform: translate(350px, 50px) rotate(-90deg); opacity: 0; }
        .pin.scatter.p6 { transform: translate(300px, 320px) rotate(180deg); opacity: 0; }

        /* Logo Planète */
        .planet-logo {
            position: absolute;
            width: 140px; height: 140px;
            margin: -70px 0 0 -70px;
            filter: drop-shadow(0 0 15px rgba(0, 180, 255, 0.7));
            z-index: 10;
            animation: strikeAndLogo 2.2s ease-out forwards;
        }

        @keyframes strikeAndLogo {
            0% { transform: translateX(-60vw) rotate(0deg) scale(0.6); }
            45% { transform: translateX(0) rotate(720deg) scale(0.9); } /* Impact */
            100% { transform: translateX(0) translateY(-140px) rotate(1080deg) scale(1.5); } /* Position Logo */
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <div class="scene" id="mainScene">
        <div class="pin p1"></div>
        <div class="pin p2"></div>
        <div class="pin p3"></div>
        <div class="pin p4"></div>
        <div class="pin p5"></div>
        <div class="pin p6"></div>

        <img src="https://user-anonymous-dev.github.io/bowling-spatiale_/picture/logo.png" alt="Logo" class="planet-logo">
    </div>

    <script>
        // Création des étoiles
        const sf = document.getElementById('starfield');
        for (let i = 0; i < 100; i++) {
            let s = document.createElement('div');
            s.style.cssText = `position:absolute; width:2px; height:2px; background:white; border-radius:50%; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:${Math.random()}`;
            sf.appendChild(s);
        }

        window.onload = () => {
            const scene = document.getElementById('mainScene');
            const pins = document.querySelectorAll('.pin');

            // Moment de l'impact (45% de 2.2s ≈ 1s)
            setTimeout(() => {
                scene.classList.add('shake-active');
                pins.forEach(p => p.classList.add('scatter'));
            }, 1000);

            // Fin de l'animation
            setTimeout(() => {
                console.log("A7");
            }, 2200);
        };
    </script>
</body>
</html>
