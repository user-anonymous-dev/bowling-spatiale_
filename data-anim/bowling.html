<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Spatial</title>
    <style>
        /* --- UTILISATION DE TA PALETTE DE COULEURS --- */
        :root {
            --bg-color: #1E293B;      /* Bleu nuit / Espace profond */
            --cyan-accent: #06B6D4;   /* Contour et textes secondaires */
            --orange-power: #F59E0B;  /* Données importantes (Niveau, Masse) */
            --purple-neon: #8B5CF6;   /* Effets et quilles (Z) */
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Panneau de statistiques */
        #hud {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid var(--cyan-accent);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .stat-label { color: var(--cyan-accent); }
        .stat-value { color: var(--orange-power); font-weight: bold; font-size: 1.2rem; }
        .stat-z { color: var(--purple-neon); font-weight: bold; font-size: 1.2rem; }

        /* Arène et Astre */
        #arena {
            position: relative;
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
        }

        #astre {
            width: 120px;
            height: 120px;
            position: absolute;
            left: -150px; /* Caché hors de l'écran au départ */
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(245, 158, 11, 0.2);
            /* L'animation de roulement/vol */
            transition: transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .lancer {
            /* Fait traverser l'écran à l'astre tout en le faisant tourner */
            transform: translateX(calc(100vw + 150px)) rotate(1080deg);
        }

        /* Message d'attente */
        #waiting {
            color: var(--cyan-accent);
            font-size: 1.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div id="waiting">En attente de transmission orbitale...</div>

    <div id="hud">
        <div><span class="stat-label">Masse:</span> <span id="val-mass" class="stat-value"></span></div>
        <div><span class="stat-label">Astre:</span> <span id="val-type" class="stat-value"></span></div>
        <div><span class="stat-label">Puissance:</span> <span id="val-lvl" class="stat-value"></span></div>
        <div><span class="stat-label">Quilles:</span> <span id="val-z" class="stat-z"></span></div>
    </div>

    <div id="arena">
        <img id="astre" src="" alt="Astre au bowling">
    </div>

    <script>
        // Écouteur d'événements pour le postMessage du site parent (Site B)
        window.addEventListener('message', (event) => {
            const data = event.data;

            // 1. Amélioration du pattern (Traitement de ta chaîne de caractères)
            if (typeof data === 'string') {
                // Cette expression régulière cherche : Chiffre + kg | Type: Mot | Chiffre + lvl | Z + Chiffre
                const regex = /(\d+(?:\.\d+)?)\s*kg\s*\|\s*Type\s*:\s*([^|]+)\s*\|\s*(\d+)\s*lvl\s*\|\s*Z(\d+)/i;
                const match = data.match(regex);

                if (match) {
                    const params = {
                        mass: match[1],
                        type: match[2].trim(),
                        lvl: match[3],
                        zLevel: match[4]
                    };
                    declencherAnimation(params);
                } else {
                    console.error("Format de message non reconnu :", data);
                }
            } 
            // 2. Format JSON (Best Practice)
            else if (typeof data === 'object' && data.action === 'lancer') {
                declencherAnimation(data.payload);
            }
        });

        function declencherAnimation(params) {
            // Cacher le texte d'attente, afficher le HUD
            document.getElementById('waiting').style.display = 'none';
            document.getElementById('hud').style.opacity = '1';

            // Mettre à jour les textes
            document.getElementById('val-mass').innerText = params.mass + 'kg';
            document.getElementById('val-type').innerText = params.type;
            document.getElementById('val-lvl').innerText = 'Lvl ' + params.lvl;
            document.getElementById('val-z').innerText = 'Lvl ' + params.zLevel;

            // Gestion de l'image de l'astre
            const astreImg = document.getElementById('astre');
            
            // On formate le nom (ex: "Trou Noir" devient "trou-noir" ou "Terre" devient "terre")
            const imageFileName = params.type.toLowerCase().replace(/\s+/g, '-');
            astreImg.src = `https://user-anonymous-dev.github.io/bowling-spatiale_/picture/astres/${imageFileName}.png`;
            
            // Fallback: Si l'image n'existe pas, on met le template
            astreImg.onerror = function() {
                this.onerror = null; // Empêche une boucle infinie si le template est aussi cassé
                this.src = 'https://user-anonymous-dev.github.io/bowling-spatiale_/picture/template-astres.png';
            };

            // Lancer l'animation
            astreImg.classList.remove('lancer');
            
            // Un micro-délai est nécessaire pour que le navigateur réinitialise l'animation
            setTimeout(() => {
                // Petit bonus : tu peux faire varier la durée de la transition CSS 
                // en fonction de la masse ou de la puissance via du JS ici !
                astreImg.classList.add('lancer');
            }, 50);
        }

        // --- OUTIL DE TEST ---
        // Décommente la ligne ci-dessous pour tester l'animation sans avoir besoin du Site B !
        /*
        setTimeout(() => {
            window.postMessage("150kg | Type : Mars | 42lvl | Z5", "*");
        }, 1000);
        */
    </script>
</body>
</html>
