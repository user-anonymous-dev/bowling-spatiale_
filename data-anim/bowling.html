<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Spatial Bowling Physics Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg: #1E293B; --cyan: #06B6D4; --orange: #F59E0B; --purple: #8B5CF6;
        }
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); font-family: 'Segoe UI', sans-serif; 
        }
        
        /* HUD cockpit */
        #ui {
            position: absolute; top: 0; left: 0; right: 0; padding: 15px;
            display: flex; justify-content: space-around;
            background: rgba(30, 41, 59, 0.9);
            border-bottom: 2px solid var(--cyan);
            z-index: 10; pointer-events: none;
            color: white; text-transform: uppercase; font-size: 12px;
        }
        .val { color: var(--orange); font-weight: bold; font-size: 16px; display: block; }
        .val-z { color: var(--purple); }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div>Masse <span id="ui-kg" class="val">-</span></div>
    <div>Astre <span id="ui-type" class="val">-</span></div>
    <div>Puissance <span id="ui-lvl" class="val">-</span></div>
    <div>Niveau Z <span id="ui-z" class="val val-z">-</span></div>
</div>

<script>
    // --- CONFIGURATION MOTEUR PHYSIQUE ---
    const { Engine, Render, Runner, Bodies, Composite, Body, Vector } = Matter;
    
    const engine = Engine.create();
    // Gravité spatiale (très faible ou vers le haut de l'écran pour simuler la piste)
    engine.world.gravity.y = 0; 

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: {
            width: window.innerWidth,
            height: window.innerHeight,
            wireframes: false, // On veut voir les couleurs, pas les lignes de debug
            background: '#1E293B'
        }
    });

    Render.run(render);
    const runner = Runner.create();
    Runner.run(runner, engine);

    // Murs invisibles pour garder les objets à l'écran
    const walls = [
        Bodies.rectangle(window.innerWidth/2, -50, window.innerWidth, 100, { isStatic: true }),
        Bodies.rectangle(window.innerWidth/2, window.innerHeight + 50, window.innerWidth, 100, { isStatic: true }),
        Bodies.rectangle(-50, window.innerHeight/2, 100, window.innerHeight, { isStatic: true }),
        Bodies.rectangle(window.innerWidth + 50, window.innerHeight/2, 100, window.innerHeight, { isStatic: true })
    ];
    Composite.add(engine.world, walls);

    // --- LOGIQUE DE JEU ---
    window.addEventListener('message', (e) => {
        const regex = /(\d+)kg\s*\|\s*Type\s*:\s*([^|]+)\s*\|\s*(\d+)lvl\s*\|\s*Z(\d+)/i;
        const m = typeof e.data === 'string' ? e.data.match(regex) : null;
        if (m) {
            spawnAndLaunch({
                kg: parseInt(m[1]),
                type: m[2].trim(),
                lvl: parseInt(m[3]),
                z: parseInt(m[4])
            });
        }
    });

    function spawnAndLaunch(data) {
        // Nettoyage de la zone
        Composite.clear(engine.world, true);
        Composite.add(engine.world, walls);

        // Update UI
        document.getElementById('ui-kg').innerText = data.kg + "kg";
        document.getElementById('ui-type').innerText = data.type;
        document.getElementById('ui-lvl').innerText = data.lvl;
        document.getElementById('ui-z').innerText = "Z" + data.z;

        // 1. Création des quilles (selon Z)
        // Disposées en triangle au fond (à droite)
        const pinColor = '#8B5CF6';
        const startX = window.innerWidth - 150;
        const startY = window.innerHeight / 2;
        const spacing = 40;
        let rows = Math.ceil(data.z / 3); 
        
        for(let i = 0; i < data.z; i++) {
            const col = Math.floor(i / 3);
            const row = i % 3;
            const pin = Bodies.rectangle(
                startX + (col * spacing), 
                startY + (row * spacing) - (spacing), 
                20, 45, {
                    render: { fillStyle: pinColor, strokeStyle: '#FFFFFF', lineWidth: 1 },
                    friction: 0.3,
                    restitution: 0.5 // Rebond
                }
            );
            Composite.add(engine.world, pin);
        }

        // 2. Création de l'Astre
        const radius = Math.max(20, Math.min(data.kg / 5, 80)); // Taille proportionnelle au KG
        const imgName = data.type.toLowerCase().replace(/\s+/g, '-');
        const imgUrl = `https://user-anonymous-dev.github.io/bowling-spatiale_/picture/astres/${imgName}.png`;
        
        const astre = Bodies.circle(100, window.innerHeight / 2, radius, {
            mass: data.kg / 10,
            restitution: 0.6,
            render: {
                sprite: {
                    texture: imgUrl,
                    xScale: (radius * 2) / 100, // Ajustement de l'image à la taille physique
                    yScale: (radius * 2) / 100
                }
            }
        });

        // Test de validité de l'image (fallback)
        const img = new Image();
        img.src = imgUrl;
        img.onerror = () => {
            astre.render.sprite.texture = 'https://user-anonymous-dev.github.io/bowling-spatiale_/picture/template-astres.png';
        };

        Composite.add(engine.world, astre);

        // 3. Lancement (Collision réelle)
        // La force dépend du lvl
        const forceMagnitude = (data.lvl / 100) * (astre.mass * 0.5);
        
        // On attend un court instant que tout soit posé avant de tirer
        setTimeout(() => {
            Body.applyForce(astre, astre.position, { x: forceMagnitude, y: 0 });
        }, 500);
    }

    // Ajustement taille fenêtre
    window.addEventListener('resize', () => {
        render.canvas.width = window.innerWidth;
        render.canvas.height = window.innerHeight;
    });
</script>
</body>
</html>
