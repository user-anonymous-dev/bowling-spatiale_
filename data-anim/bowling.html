<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bowling Spatial Ultra</title>
    <style>
        :root {
            --bg: #1E293B; --cyan: #06B6D4; --orange: #F59E0B; --purple: #8B5CF6;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: var(--bg); font-family: 'orbitron', 'Segoe UI', sans-serif;
            height: 100%; color: white;
        }

        /* Fond étoilé animé */
        .stars {
            position: absolute; top: 0; left: 0; width: 200%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3; animation: slideStars 100s linear infinite;
        }

        @keyframes slideStars { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* HUD Style Cockpit */
        #hud {
            position: absolute; top: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            padding: 15px 25px; border-left: 5px solid var(--cyan);
            background: rgba(15, 23, 59, 0.8); backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
            border-radius: 0 15px 15px 0; z-index: 100; transform: translateY(-150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stat { display: flex; flex-direction: column; }
        .label { font-size: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 20px; font-weight: 800; color: var(--orange); }
        .value-z { color: var(--purple); }

        /* La Piste (Perspective 3D) */
        .piste {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 80vh;
            background: linear-gradient(to top, rgba(6, 182, 212, 0.2), transparent);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border-bottom: 4px solid var(--cyan);
        }

        /* L'Astre */
        #astre {
            position: absolute; bottom: 50px; left: 50%;
            width: 80px; height: 80px; margin-left: -40px;
            z-index: 50; filter: drop-shadow(0 0 15px var(--orange));
            transform: scale(0); transition: transform 0.3s ease-out;
        }

        /* Les Quilles (Z) */
        #quilles-container {
            position: absolute; top: 20%; left: 50%;
            transform: translateX(-50%); display: flex; flex-wrap: wrap-reverse;
            justify-content: center; width: 150px; gap: 8px;
        }

        .quille {
            width: 15px; height: 40px; background: var(--purple);
            border-radius: 3px; box-shadow: 0 0 10px var(--purple);
            transition: all 0.4s ease-out;
        }

        /* ANIMATIONS */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .launch-move {
            transition: all 1s cubic-bezier(0.55, 0.055, 0.675, 0.19) !important;
            transform: translate(-50%, -400px) scale(0.2) rotate(720deg) !important;
            opacity: 0.5;
        }

        .explode { transform: scale(0) rotate(180deg); opacity: 0; filter: blur(10px); }
    </style>
</head>
<body>

<div class="stars"></div>
<div id="hud">
    <div class="stat"><span class="label">Masse</span><span id="v-kg" class="value">0</span></div>
    <div class="stat"><span class="label">Type</span><span id="v-type" class="value">None</span></div>
    <div class="stat"><span class="label">Power</span><span id="v-lvl" class="value">0</span></div>
    <div class="stat"><span class="label">Target Z</span><span id="v-z" class="value value-z">0</span></div>
</div>

<div class="piste"></div>

<div id="quilles-container"></div>

<img id="astre" src="" alt="Astre">

<script>
    const astre = document.getElementById('astre');
    const hud = document.getElementById('hud');
    const container = document.getElementById('quilles-container');

    window.addEventListener('message', (e) => {
        const regex = /(\d+)kg\s*\|\s*Type\s*:\s*([^|]+)\s*\|\s*(\d+)lvl\s*\|\s*Z(\d+)/i;
        const m = typeof e.data === 'string' ? e.data.match(regex) : null;
        if (m) launch({ kg: m[1], type: m[2].trim(), lvl: m[3], z: m[4] });
    });

    function launch(data) {
        // Reset
        astre.style.transition = 'none';
        astre.style.transform = 'scale(0)';
        astre.className = '';
        container.innerHTML = '';
        
        // Setup HUD
        document.getElementById('v-kg').innerText = data.kg + 'kg';
        document.getElementById('v-type').innerText = data.type;
        document.getElementById('v-lvl').innerText = 'Lvl ' + data.lvl;
        document.getElementById('v-z').innerText = 'Z' + data.z;
        hud.style.transform = 'translateY(0)';

        // Setup Quilles (Z)
        for(let i=0; i < Math.min(data.z, 20); i++) {
            const q = document.createElement('div');
            q.className = 'quille';
            container.appendChild(q);
        }

        // Setup Image
        const name = data.type.toLowerCase().replace(/\s+/g, '-');
        astre.src = `https://user-anonymous-dev.github.io/bowling-spatiale_/picture/astres/${name}.png`;
        astre.onerror = () => astre.src = 'https://user-anonymous-dev.github.io/bowling-spatiale_/picture/template-astres.png';

        // Séquence d'animation
        setTimeout(() => {
            // Apparition (Taille basée sur KG - min 0.5, max 1.5)
            const size = Math.max(0.5, Math.min(data.kg / 100, 1.8));
            astre.style.transform = `scale(${size})`;
            
            // Lancement (Vitesse basée sur LVL)
            setTimeout(() => {
                const duration = Math.max(0.4, 1.5 - (data.lvl / 50));
                astre.style.transition = `all ${duration}s cubic-bezier(0.5, 0, 0.7, 0.2)`;
                astre.classList.add('launch-move');

                // Impact
                setTimeout(() => {
                    document.body.classList.add('shake');
                    const quilles = document.querySelectorAll('.quille');
                    quilles.forEach(q => q.classList.add('explode'));
                    
                    setTimeout(() => {
                        document.body.classList.remove('shake');
                        hud.style.transform = 'translateY(-150%)';
                    }, 1000);
                }, duration * 1000);
            }, 600);
        }, 100);
    }
</script>
</body>
</html>
