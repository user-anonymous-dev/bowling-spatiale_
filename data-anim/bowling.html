<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Spatial Bowling - Collision Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1E293B; --cyan: #06B6D4; --orange: #F59E0B; --purple: #8B5CF6; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Orbitron', sans-serif; }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.2)); }
        
        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            border-left: 3px solid var(--cyan); padding-left: 15px;
            pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .label { font-size: 10px; color: var(--cyan); text-transform: uppercase; }
        .val { font-size: 18px; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="hud">
    <div class="label">Masse</div><div id="u-kg" class="val">-</div>
    <div class="label">Astre</div><div id="u-type" class="val">-</div>
    <div class="label">Vitesse</div><div id="u-lvl" class="val">-</div>
    <div class="label">Quilles</div><div id="u-z" class="val" style="color:var(--purple)">-</div>
</div>

<script>
// --- CONFIGURATION DU MOTEUR ---
const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

const engine = Engine.create();
// On augmente la précision pour éviter que les objets traversent les murs
engine.positionIterations = 10; 
engine.velocityIterations = 10;
engine.world.gravity.y = 0; // Gravité zéro par défaut (espace)

const render = Render.create({
    element: document.body,
    engine: engine,
    options: {
        width: window.innerWidth,
        height: window.innerHeight,
        wireframes: false,
        background: '#1E293B'
    }
});

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// --- LIMITES DE LA PISTE (Murs invisibles pour rebonds) ---
const wallOptions = { isStatic: true, render: { visible: false }, restitution: 0.5 };
const walls = [
    Bodies.rectangle(window.innerWidth/2, 0, window.innerWidth, 20, wallOptions), // Haut
    Bodies.rectangle(window.innerWidth/2, window.innerHeight, window.innerWidth, 20, wallOptions), // Bas
    Bodies.rectangle(window.innerWidth, window.innerHeight/2, 20, window.innerHeight, wallOptions) // Fond
];
Composite.add(engine.world, walls);

// --- GESTION DU MESSAGE ---
window.addEventListener('message', (e) => {
    const regex = /(\d+)kg\s*\|\s*Type\s*:\s*([^|]+)\s*\|\s*(\d+)lvl\s*\|\s*Z(\d+)/i;
    const m = typeof e.data === 'string' ? e.data.match(regex) : null;
    if (m) {
        initGame({ kg: parseInt(m[1]), type: m[2].trim(), lvl: parseInt(m[3]), z: parseInt(m[4]) });
    }
});

function initGame(data) {
    // Nettoyage (sauf les murs)
    const allBodies = Composite.allBodies(engine.world);
    allBodies.forEach(b => { if(!b.isStatic) Composite.remove(engine.world, b); });

    // UI
    document.getElementById('u-kg').innerText = data.kg + "kg";
    document.getElementById('u-type').innerText = data.type;
    document.getElementById('u-lvl').innerText = data.lvl;
    document.getElementById('u-z').innerText = "Z" + data.z;

    // 1. GÉNÉRATION DES QUILLES (Formation triangle)
    const pins = [];
    const pinCount = Math.min(data.z, 20);
    const startX = window.innerWidth - 200;
    const startY = window.innerHeight / 2;
    
    for (let i = 0; i < pinCount; i++) {
        let row = Math.floor(Math.sqrt(2 * i + 0.25) - 0.5);
        let col = i - (row * (row + 1) / 2);
        
        const pin = Bodies.rectangle(
            startX + (row * 35), 
            startY + (col * 45) - (row * 22), 
            22, 45, {
                restitution: 0.4,
                friction: 0.2,
                density: 0.005,
                render: { 
                    fillStyle: '#8B5CF6',
                    strokeStyle: '#FFFFFF',
                    lineWidth: 2
                }
            }
        );
        pins.push(pin);
    }
    Composite.add(engine.world, pins);

    // 2. GÉNÉRATION DE L'ASTRE
    // Taille basée sur KG (échelle log pour éviter les planètes trop géantes)
    const radius = Math.max(25, Math.min(data.kg / 4, 90));
    const name = data.type.toLowerCase().replace(/\s+/g, '-');
    const imgUrl = `https://user-anonymous-dev.github.io/bowling-spatiale_/picture/astres/${name}.png`;

    const astre = Bodies.circle(100, window.innerHeight / 2, radius, {
        mass: data.kg / 5,
        restitution: 0.6,
        frictionAir: 0.01,
        render: {
            sprite: {
                texture: imgUrl,
                xScale: (radius * 2.2) / 100,
                yScale: (radius * 2.2) / 100
            }
        }
    });

    // Fallback image
    const img = new Image();
    img.src = imgUrl;
    img.onerror = () => astre.render.sprite.texture = 'https://user-anonymous-dev.github.io/bowling-spatiale_/picture/template-astres.png';

    Composite.add(engine.world, astre);

    // 3. LANCEMENT PHYSIQUE
    // On applique une impulsion vectorielle basée sur le LVL
    const speed = data.lvl / 10;
    setTimeout(() => {
        Body.setVelocity(astre, { x: speed, y: (Math.random() - 0.5) * 2 });
        // Rotation initiale pour le style
        Body.setAngularVelocity(astre, 0.1);
    }, 500);
}

// 4. EFFETS D'IMPACT (Particules)
Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        const p = pair.collision.supports[0];
        if (p) {
            // Ici tu pourrais ajouter un système de particules canvas
            // Pour l'instant, on fait flasher la quille
            if (pair.bodyB.render) {
                pair.bodyB.render.fillStyle = '#06B6D4';
                setTimeout(() => { if(pair.bodyB.render) pair.bodyB.render.fillStyle = '#8B5CF6'; }, 100);
            }
        }
    });
});

window.addEventListener('resize', () => {
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;
});
</script>
</body>
</html>
