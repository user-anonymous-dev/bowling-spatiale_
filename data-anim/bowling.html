<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowling Spatial Pro</title>
    <style>
        :root {
            --bg-color: #1E293B;
            --cyan-accent: #06B6D4;
            --orange-power: #F59E0B;
            --purple-neon: #8B5CF6;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            /* Petit effet d'étoiles en arrière-plan */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
        }

        /* Interface (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--cyan-accent);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .stat-value { color: var(--orange-power); font-weight: bold; }

        /* Zone de jeu */
        #stage {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        /* L'Astre */
        #astre {
            width: 100px;
            height: 100px;
            position: absolute;
            left: -150px;
            z-index: 10;
            border-radius: 50%;
            filter: drop-shadow(0 0 15px var(--orange-power));
        }

        /* Les Quilles (représentées par le niveau Z) */
        #pins-container {
            position: absolute;
            right: 15%;
            height: 200px;
            display: flex;
            flex-wrap: wrap;
            width: 120px;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .pin {
            width: 20px;
            height: 60px;
            background: var(--purple-neon);
            border-radius: 5px;
            box-shadow: 0 0 15px var(--purple-neon);
            transition: transform 0.5s, opacity 0.5s;
        }

        /* Animation du lancer */
        .lancer-anim {
            animation: voyage 2s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes voyage {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(calc(100vw + 200px)) rotate(1000deg); }
        }

        /* Quand une quille est touchée */
        .pin-hit {
            transform: translateY(100px) rotate(90deg) scale(0);
            opacity: 0;
        }

        #waiting {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            color: var(--cyan-accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="waiting">Scanner de trajectoire actif...</div>

    <div id="hud">
        <div id="info-text"></div>
    </div>

    <div id="stage">
        <img id="astre" src="" alt="">
        <div id="pins-container"></div>
    </div>

    <script>
        window.addEventListener('message', (event) => {
            const data = event.data;
            const regex = /(\d+)kg\s*\|\s*Type\s*:\s*([^|]+)\s*\|\s*(\d+)lvl\s*\|\s*Z(\d+)/i;
            const match = typeof data === 'string' ? data.match(regex) : null;

            if (match) {
                const config = {
                    mass: match[1],
                    type: match[2].trim(),
                    lvl: match[3],
                    z: match[4]
                };
                runStrike(config);
            }
        });

        function runStrike(cfg) {
            document.getElementById('waiting').style.opacity = '0';
            const hud = document.getElementById('hud');
            hud.style.opacity = '1';
            hud.innerHTML = `
                <span>MASSE: <span class="stat-value">${cfg.mass}kg</span></span>
                <span>TYPE: <span class="stat-value">${cfg.type}</span></span>
                <span>POWER: <span class="stat-value">Lvl ${cfg.lvl}</span></span>
                <span>QUILLES: <span class="stat-value">Z${cfg.z}</span></span>
            `;

            // Configurer l'image
            const astre = document.getElementById('astre');
            const imgName = cfg.type.toLowerCase().replace(/\s+/g, '-');
            astre.src = `https://user-anonymous-dev.github.io/bowling-spatiale_/picture/astres/${imgName}.png`;
            astre.onerror = () => astre.src = 'https://user-anonymous-dev.github.io/bowling-spatiale_/picture/template-astres.png';

            // Générer les quilles basées sur Z
            const container = document.getElementById('pins-container');
            container.innerHTML = '';
            // On crée autant de quilles que le niveau Z (limité à 15 pour le visuel)
            const count = Math.min(cfg.z, 15);
            for(let i=0; i<count; i++) {
                const pin = document.createElement('div');
                pin.className = 'pin';
                container.appendChild(pin);
            }

            // Reset & Lancer
            astre.classList.remove('lancer-anim');
            void astre.offsetWidth; // Force le reflow
            astre.classList.add('lancer-anim');

            // Simuler l'impact après 1.4s (quand la boule arrive vers la droite)
            setTimeout(() => {
                const pins = document.querySelectorAll('.pin');
                pins.forEach((p, index) => {
                    setTimeout(() => {
                        p.classList.add('pin-hit');
                    }, index * 50); // Petit décalage pour l'effet de choc
                });
            }, 1400);
        }
    </script>
</body>
</html>
